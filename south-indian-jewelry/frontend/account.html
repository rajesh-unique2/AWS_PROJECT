<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account - South Indian Wedding Jewelry Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <h1>South Indian Wedding Jewelry Online</h1>
      <div class="nav-actions">
        <span id="userLabel">Guest</span>
        <a class="btn nav-track-link" href="./index.html"><i class="fa-solid fa-store"></i> Shop</a>
        <a class="btn nav-track-link" href="./tracking.html"><i class="fa-solid fa-truck-fast"></i> Track Delivery</a>
        <button id="logoutBtn" class="btn secondary"><i class="fa-solid fa-right-from-bracket"></i> Exit</button>
      </div>
    </div>
  </header>

  <main>
    <section id="likedSection" class="container animate-reveal">
      <h3>Liked Items</h3>
      <div id="wishlistItems" class="orders-box wishlist-grid"></div>
    </section>

    <section id="cartSection" class="container cart-section animate-reveal">
      <div class="section-head">
        <h3>My Card</h3>
        <button id="refreshCartBtn" class="btn secondary">Refresh Cart</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="checkout-payment" aria-label="Payment options">
        <h4>Select Payment Method</h4>
        <div class="payment-method-tabs" aria-label="Payment methods">
          <button class="payment-method-btn active" type="button" data-payment="UPI_ID"><i class="fa-brands fa-google-pay"></i> UPI ID</button>
          <button class="payment-method-btn" type="button" data-payment="CARD"><i class="fa-regular fa-credit-card"></i> Card</button>
          <button class="payment-method-btn" type="button" data-payment="NET_BANKING"><i class="fa-solid fa-building-columns"></i> Net Banking</button>
          <button class="payment-method-btn" type="button" data-payment="UPI_APP"><i class="fa-solid fa-mobile-screen-button"></i> UPI Apps</button>
          <button class="payment-method-btn" type="button" data-payment="SCAN_PAY"><i class="fa-solid fa-qrcode"></i> Scan & Pay</button>
        </div>
        <div class="payment-grid">
          <label class="payment-option" id="upiIdWrap" for="upiIdInput">
            <span>UPI ID</span>
            <input id="upiIdInput" type="text" placeholder="example@upi" />
          </label>
          <label class="payment-option hidden" id="upiAppWrap" for="upiAppSelect">
            <span>UPI App</span>
            <select id="upiAppSelect" aria-label="Choose UPI app">
              <option value="Google Pay">Google Pay</option>
              <option value="PhonePe">PhonePe</option>
              <option value="Paytm">Paytm</option>
              <option value="BHIM">BHIM</option>
              <option value="Amazon Pay">Amazon Pay</option>
            </select>
          </label>
          <label class="payment-option hidden" id="cardNumberWrap" for="cardNumberInput">
            <span>Card Number</span>
            <input id="cardNumberInput" type="text" inputmode="numeric" maxlength="19" placeholder="1234 5678 9012 3456" />
          </label>
          <label class="payment-option hidden" id="netBankWrap" for="netBankSelect">
            <span>Select Bank</span>
            <select id="netBankSelect" aria-label="Choose bank for net banking">
              <option value="">Choose your bank</option>
              <option value="Airtel Payments Bank">Airtel Payments Bank</option>
              <option value="Axis Bank">Axis Bank</option>
              <option value="HDFC Bank">HDFC Bank</option>
              <option value="ICICI Bank">ICICI Bank</option>
              <option value="Kotak Bank">Kotak Bank</option>
              <option value="State Bank of India">State Bank of India</option>
            </select>
          </label>
          <div class="payment-option hidden" id="scanPayWrap">
            <span>Scan & Pay Reference</span>
            <input id="scanRefInput" type="text" placeholder="Enter transaction reference" />
            <div class="scan-pay-camera-controls">
              <button id="scanCameraBtn" type="button" class="btn secondary"><i class="fa-solid fa-camera"></i> Open Camera</button>
              <button id="scanCameraStopBtn" type="button" class="btn secondary hidden"><i class="fa-solid fa-stop"></i> Stop Camera</button>
            </div>
            <video id="scanVideo" class="scan-video hidden" muted></video>
            <small id="scanCameraStatus" class="scan-status">Use camera to scan UPI QR and auto-fill reference.</small>
          </div>
        </div>
      </div>
      <div class="cart-footer">
        <strong>Total: ₹<span id="cartTotal">0</span></strong>
        <button id="placeOrderBtn" class="btn"><i class="fa-solid fa-box-open"></i> Place Order</button>
      </div>
    </section>

    <section id="ordersSection" class="container animate-reveal">
      <h3>My Orders</h3>
      <div id="ordersBox" class="orders-box orders-dark"></div>
    </section>

    <div id="toast" class="toast"></div>
  </main>

  <script src="./js/account.js?v=20260302"></script>
</body>
</html>
